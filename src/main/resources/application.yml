server:
  port: ${SERVER_PORT:8089}
  servlet:
    context-path: /api

spring:
  config:
    import: optional:file:./config/application-local.yml
  application:
    name: petshop-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/petshop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.petshop.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: ${SA_TOKEN_TIMEOUT:2592000}
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

knife4j:
  enable: true
  setting:
    language: zh_cn

wx:
  miniapp:
    appid: ${WX_MINIAPP_APPID:}
    secret: ${WX_MINIAPP_SECRET:}

logging:
  level:
    com.petshop: debug
